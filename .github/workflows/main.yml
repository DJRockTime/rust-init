name: Download Best Rust Version

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Create Download Folder
        run: mkdir downloads

      - name: Priority Download (Latest to Stable)
        shell: powershell
        run: |
          # 定义优先级版本列表（从高到低）
          $versions = @("1.94.1", "1.94.0", "1.93.0", "1.85.0")
          $success = $false
          
          # 设置 TLS 协议
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          # 首先下载基础工具 rustup-init (这个地址通常是固定的)
          Write-Host "正在下载 rustup-init.exe..."
          Invoke-WebRequest -Uri "https://rust-lang.org" -OutFile "downloads\rustup-init.exe" -UserAgent "Mozilla/5.0"

          # 循环尝试版本列表
          foreach ($v in $versions) {
              $url = "https://rust-lang.org"
              Write-Host "正在尝试下载版本 v$v : $url"
              try {
                  Invoke-WebRequest -Uri $url -OutFile "downloads\rust-standalone.msi" -ErrorAction Stop -UserAgent "Mozilla/5.0"
                  
                  # 检查下载的文件是否有效（大于 100MB）
                  if ((Get-Item "downloads\rust-standalone.msi").Length -gt 100MB) {
                      Write-Host "成功拿到版本 v$v ！文件大小: $("{0:N2}" -f ((Get-Item "downloads\rust-standalone.msi").Length / 1MB)) MB"
                      $success = $true
                      break # 找到最高优先级的可用版本，退出循环
                  }
              } catch {
                  Write-Host "版本 v$v 不可用 (404 或网络错误)，尝试下一个..."
              }
          }

          if (-not $success) {
              Write-Error "列表中的所有版本都无法下载！"
              exit 1
          }

      - name: Check Final Files
        shell: powershell
        run: Get-ChildItem downloads | Select-Object Name, @{Name="Size(MB)";Expression={"{0:N2}" -f ($_.Length / 1MB)}}

      - name: Upload to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: rust-best-available-win64
          path: downloads/
