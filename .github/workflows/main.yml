name: Download Rust Installers

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Create Download Folder
        run: mkdir downloads

      - name: Download via Global CDN
        shell: powershell
        run: |
          # 1.85.0 是目前最稳的稳定版链接
          $version = "1.85.0" 
          
          $url_init = "https://rust-lang.org"
          $url_msi = "https://rust-lang.org"
          
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          Write-Host "正在下载 rustup-init.exe..."
          Invoke-WebRequest -Uri $url_init -OutFile "downloads\rustup-init.exe" -UserAgent "Mozilla/5.0"
          
          Write-Host "正在下载 MSI 离线包 v$version (大约 200MB+)..."
          Invoke-WebRequest -Uri $url_msi -OutFile "downloads\rust-standalone.msi" -UserAgent "Mozilla/5.0"

      - name: 验证文件大小
        shell: powershell
        run: |
          $files = Get-ChildItem downloads
          foreach ($file in $files) {
              $sizeMB = $file.Length / 1MB
              Write-Host "$($file.Name) 大小: $("{0:N2}" -f $sizeMB) MB"
              if ($file.Length -lt 1MB) { 
                  Write-Error "文件 $($file.Name) 太小，下载可能失败了！"
                  exit 1 
              }
          }

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: rust-installers-win64
          path: downloads/
