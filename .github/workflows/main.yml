name: Download Valid Rust Version

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Create Download Folder
        run: mkdir downloads

      - name: Download Confirmed Stable Version
        shell: powershell
        run: |
          # 1.85.0 是当前（2025年初）最稳、最新的版本
          # 1.94.x 目前在服务器上不存在，所以会报 404 (0.02MB)
          $version = "1.85.0"
          
          # 设置 TLS 1.2 协议保障
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          
          # 下载链接
          $url_init = "https://rust-lang.org"
          $url_msi = "https://rust-lang.org"

          Write-Host "正在下载 rustup-init.exe..."
          Invoke-WebRequest -Uri $url_init -OutFile "downloads\rustup-init.exe" -UserAgent "Mozilla/5.0"
          
          Write-Host "正在下载真实存在的 MSI v$version..."
          Invoke-WebRequest -Uri $url_msi -OutFile "downloads\rust-standalone.msi" -UserAgent "Mozilla/5.0"

      - name: 验证文件大小 (必须大于100MB)
        shell: powershell
        run: |
          $msi = Get-Item "downloads\rust-standalone.msi"
          $sizeMB = $msi.Length / 1MB
          Write-Host "最终文件大小: $("{0:N2}" -f $sizeMB) MB"
          
          if ($msi.Length -lt 100MB) {
              Write-Error "下载失败！文件太小，这只是个错误页面。请检查版本号。"
              exit 1
          }

      - name: Upload to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: rust-v1.85-win64
          path: downloads/
