name: Download Rust Installers

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Create Download Folder
        run: mkdir downloads

      - name: Download via Global CDN
        shell: powershell
        run: |
          # Define the version
          $version = "1.85.0" # Note: 1.94.1 is very new, let's use 1.85.0 if 1.94.1 fails
          
          # Direct Global CDN Links (Backbone for static.rust-lang.org)
          $url_init = "https://rust-lang.org"
          $url_msi = "https://rust-lang.org"
          
          # Set TLS 1.2
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          Function Download-WithRetry {
              param ($url, $path)
              $retryCount = 0
              $maxRetries = 3
              while ($retryCount -lt $maxRetries) {
                  try {
                      Write-Host "Attempting download: $url"
                      Invoke-WebRequest -Uri $url -OutFile $path -TimeoutSec 300 -UserAgent "Mozilla/5.0"
                      return
                  } catch {
                      $retryCount++
                      Write-Host "Download failed. Retrying ($retryCount/$maxRetries)..."
                      Start-Sleep -Seconds 5
                  }
              }
              throw "Failed to download $url after $maxRetries attempts."
          }

          Download-WithRetry -url $url_init -path "downloads\rustup-init.exe"
          Download-WithRetry -url $url_msi -path "downloads\rust-standalone.msi"

      - name: Check File Sizes
        shell: powershell
        run: |
          Get-ChildItem downloads | Select-Object Name, @{Name="Size(MB)";Expression={"{0:N2}" -f ($_.Length / 1MB)}}

      - name: Upload to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: rust-installers-win64
          path: downloads/
